services:
  - type: web
    name: robotic-crop-disease-detection
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd Robotic && gunicorn Robotic.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
